name: Lint PR Title

on:
  pull_request_target:
    types: [opened, reopened, edited]

permissions:
  pull-requests: read

jobs:
  main:
    name: Validate Conventional Commit
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Require conventional commit prefix in PR title.
          # When using squash-merge, the PR title becomes the commit message,
          # which release-please parses to determine version bumps.
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            revert
          requireScope: false
