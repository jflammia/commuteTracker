services:
  # ── GPS data receiver (always running) ──────────────────────────────────────
  receiver:
    build: .
    container_name: commute-receiver
    ports:
      - "8080:8080"
    volumes:
      - commute-data:/data
      # To store on NAS instead of a Docker volume, replace the line above with:
      # - /mnt/nas/commute-tracker:/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/commute_tracker.db
      - RECEIVER_HOST=0.0.0.0
      - RECEIVER_PORT=8080
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # ── Dashboard (optional, for viewing data) ──────────────────────────────────
  dashboard:
    build: .
    container_name: commute-dashboard
    command: ["streamlit", "run", "src/dashboard/app.py", "--server.port=8501", "--server.address=0.0.0.0", "--server.headless=true"]
    ports:
      - "8501:8501"
    volumes:
      - commute-data:/data
      # Match the receiver's mount if using NAS:
      # - /mnt/nas/commute-tracker:/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////data/commute_tracker.db
      - DERIVED_DATA_DIR=/data/derived
    depends_on:
      receiver:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - dashboard

volumes:
  commute-data:
