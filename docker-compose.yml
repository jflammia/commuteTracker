services:
  receiver:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - commute-data:/data
    environment:
      - DATABASE_URL=sqlite:///data/commute_tracker.db
      - RECEIVER_HOST=0.0.0.0
      - RECEIVER_PORT=8080
      # S3-compatible backup (optional, uncomment and configure)
      # - S3_ENDPOINT_URL=http://minio:9000
      # - S3_BUCKET=commute-tracker-raw
      # - AWS_ACCESS_KEY_ID=minioadmin
      # - AWS_SECRET_ACCESS_KEY=minioadmin
      # - S3_SYNC_INTERVAL_SECONDS=300
      # - LOCAL_RETENTION_DAYS=90
      #
      # OwnTracks Recorder passthrough (optional, uncomment to enable)
      # - RECORDER_URL=http://recorder:8083/pub
    restart: unless-stopped

volumes:
  commute-data:
